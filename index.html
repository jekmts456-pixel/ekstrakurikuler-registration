<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>

    <link rel="stylesheet" href="form.css">
</head>
<body>

<div class="box-form">

    <h2 class="judul">📄 Form Pendaftaran</h2>

    <form id="formDaftar">

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" required>
        </div>

        <div class="form-group">
            <label>Kelas</label>

            <select name="kelas" required>
                <option value="" disabled selected>-- Pilih Kelas --</option>

                <option>VII A</option>
                <option>VII B</option>
                <option>VII C</option>
                <option>VII D</option>
                <option>VII E</option>
                <option>VII F</option>
                <option>VII G</option>
                <option>VII H</option>
                <option>VII I</option>
                <option>VII J</option>
                <option>VII K</option>

                <option>VIII A</option>
                <option>VIII B</option>
                <option>VIII C</option>
                <option>VIII D</option>
                <option>VIII E</option>
                <option>VIII F</option>
                <option>VIII G</option>
                <option>VIII H</option>
                <option>VIII I</option>
                <option>VIII J</option>
                <option>VIII K</option>

            </select>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>

            <div class="radio-group">

                <label>
                    <input type="radio" name="jk" value="Laki-laki" required>
                    Laki-laki
                </label>

                <label>
                    <input type="radio" name="jk" value="Perempuan">
                    Perempuan
                </label>

            </div>
        </div>

        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tgl_lahir">
        </div>

        <div class="form-group">
            <label>No. HP</label>
            <input type="tel" name="hp" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="example@gmail.com">
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <input type="text" name="alamat">
        </div>

        <div class="form-group">
            <label>Harapan</label>
            <textarea rows="4" name="pesan"></textarea>
        </div>

        <button type="submit">KIRIM</button>

    </form>

    <div id="hasilData">
        <h3>Data yang Dikirim</h3>
        <pre id="output"></pre>
    </div>

</div>

<script src="apalah.js"></script>

</body>
</html>
